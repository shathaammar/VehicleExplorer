<div class="spec-plate">
  <div class="plate-header">
    <span class="plate-label">VEHICLE SPEC PLATE</span>
    <span class="plate-dot" [class.active]="selection.model"></span>
  </div>

  <div class="plate-row" [class.filled]="selection.make">
    <span class="row-label">MAKE</span>
    <span class="row-value">{{ selection.make || '— — — —' }}</span>
  </div>

  <div class="plate-row" [class.filled]="selection.year">
    <span class="row-label">YEAR</span>
    <span class="row-value">{{ selection.year || '— — — —' }}</span>
  </div>

  <div class="plate-row" [class.filled]="selection.vehicleType">
    <span class="row-label">TYPE</span>
    <span class="row-value">{{ selection.vehicleType || '— — — —' }}</span>
  </div>

  <div class="plate-row" [class.filled]="selection.model">
    <span class="row-label">MODEL</span>
    <span class="row-value">{{ selection.model || '— — — —' }}</span>
  </div>
</div>
