<section class="year-type-selector" *ngIf="makeId">
  <div class="step-header">
    <span class="step-number">02</span>
    <h2 class="step-title">Year &amp; Vehicle Type</h2>
  </div>

  <input
  type="number"
  class="year-input"
  placeholder="e.g. 2020"
  [min]="minYear"
  [max]="maxYear"
  [value]="year ?? ''"
  (input)="onYearChange($any($event.target).value)"
/>

  <p class="loading-text" *ngIf="loading">Loading vehicle types...</p>

  <div class="type-chips" *ngIf="!loading && vehicleTypes.length">
    <button
      *ngFor="let type of vehicleTypes"
      class="type-chip"
      [class.active]="type.name === selectedType"
      (click)="selectType(type.name)"
    >
      {{ type.name }}
    </button>
  </div>

  <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

  <p class="empty-text" *ngIf="!loading && !vehicleTypes.length">
    No vehicle types found for this make.
  </p>
</section>
