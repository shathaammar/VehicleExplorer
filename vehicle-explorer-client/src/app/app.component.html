<main class="app-shell">
  <header class="hero">
    <h1 class="hero-title">Find Your <span class="hero-highlight">Vehicle</span></h1>
    <p class="hero-subtitle">
      Search by make, vehicle type, and year to explore models and find exactly what you need.
    </p>
  </header>

  <app-filter-bar (search)="onSearch($event)"></app-filter-bar>
  <app-model-results [searchCriteria]="searchCriteria"></app-model-results>
</main>
